name: Word Removal Request
description: Request removal of a word from the list
labels: ["word removal"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, consider posting to r/FlexWord with the **Word List** flair — that's where word debates happen. This form is for clear-cut removals only (slurs, slang used as insults, etc).
  - type: input
    id: word
    attributes:
      label: Word
      placeholder: e.g. fatty
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why should it be removed?
      placeholder: e.g. used primarily as a body-shaming insult with no common alternate meaning
    validations:
      required: true
